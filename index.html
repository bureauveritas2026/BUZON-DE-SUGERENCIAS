<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón de Sugerencias - GHL Holiday</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container main-layout">
        <!-- Header -->
        <header class="full-width">
            <h1>Buzón de Sugerencias</h1>
            <p>Tu voz ayuda a construir un mejor lugar para todos.</p>
        </header>

        <!-- Left Column: Form -->
        <main id="main-content" class="column-section">
            <section class="section-card">
                <h2 class="form-title"><i class="fas fa-edit"></i> Nueva Sugerencia</h2>
                <form id="suggestion-form">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
                    </div>
                    <div class="form-group">
                        <label for="area">Área de Trabajo</label>
                        <select id="area" name="area" required>
                            <option value="" disabled selected>Selecciona tu área</option>
                            <option value="GRP">GRP</option>
                            <option value="TH">TH</option>
                            <option value="MTTO">MTTO</option>
                            <option value="TI">TI</option>
                            <option value="CONTRALORIA">CONTRALORIA</option>
                            <option value="VENTAS">VENTAS</option>
                            <option value="RESERVAS">RESERVAS</option>
                            <option value="HK">HK</option>
                            <option value="COCINA">COCINA</option>
                            <option value="AYB">AYB</option>
                            <option value="STEWARD">STEWARD</option>
                            <option value="RECEPCION">RECEPCION</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sugerencia">¿Qué sugerencia tienes?</label>
                        <textarea id="sugerencia" name="sugerencia" rows="6" required placeholder="Describe tu idea aquí..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <i class="fas fa-paper-plane"></i> Enviar Sugerencia
                    </button>
                </form>
            </section>
        </main>

        <!-- Right Column: Wall of Fame -->
        <aside id="wall-section" class="column-section">
            <div class="section-card wall-container">
                <h2 class="form-title"><i class="fas fa-award"></i> Muro de Éxito</h2>
                <div id="approved-suggestions-grid" class="wall-stack">
                    <!-- Approved cards will be injected here -->
                    <div style="text-align: center; padding: 2rem; color: var(--brand-muted);">
                        <i class="fas fa-spinner fa-spin"></i> Cargando historias de éxito...
                    </div>
                </div>
            </div>
        </aside>

        <!-- Footer Admin Link -->
        <footer class="full-width admin-footer">
            <a href="#" id="show-login">Acceso Administrativo</a>
        </footer>

        <!-- Admin Login Section -->
        <section id="login-section" class="section-card hidden fade-in" style="max-width: 500px; margin: 2rem auto;">
            <h2 class="form-title"><i class="fas fa-lock"></i> Administración</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
                <div class="admin-link">
                    <a href="#" id="back-to-main">Volver al Inicio</a>
                </div>
            </form>
        </section>

        <!-- Admin Dashboard -->
        <section id="admin-dashboard" class="hidden fade-in">
            <div class="section-card">
                <h2 class="form-title"><i class="fas fa-chart-line"></i> Dashboard de Gestión</h2>
                
                <div class="dashboard-stats">
                    <div class="stat-box">
                        <h4>Total</h4>
                        <div class="value" id="total-count">0</div>
                    </div>
                    <div class="stat-box">
                        <h4>Pendientes</h4>
                        <div class="value" id="pending-count" style="color: var(--status-pending);">0</div>
                    </div>
                    <div class="stat-box">
                        <h4>Aprobadas</h4>
                        <div class="value" id="approved-count" style="color: var(--status-approved);">0</div>
                    </div>
                </div>

                <div style="height: 300px; margin-bottom: 2rem;">
                    <canvas id="areaChart"></canvas>
                </div>

                <div class="table-responsive">
                    <table id="suggestions-table">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Colaborador</th>
                                <th>Área</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="suggestions-body">
                            <!-- Rows loaded here -->
                        </tbody>
                    </table>
                </div>

                <div style="text-align: right; margin-top: 2rem;">
                    <button class="btn" id="logout-btn" style="background: #e2e8f0; color: #475569;">Cerrar Sesión</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
