<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón de Sugerencias - GHL Holiday</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <h1>Sugerencias GHL</h1>
            <p>Comparte tus ideas para mejorar nuestro ambiente y procesos de trabajo.</p>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-target="form-section">
                <i class="fas fa-plus"></i> Nueva Idea
            </button>
            <button class="tab-btn" data-target="wall-section">
                <i class="fas fa-star"></i> Muro de Éxito
            </button>
        </nav>

        <!-- Form Section -->
        <section id="form-section" class="section active">
            <div class="card">
                <form id="suggestion-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                        </div>
                        <div class="form-group">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="area">Área de Trabajo</label>
                        <select id="area" name="area" required>
                            <option value="" disabled selected>Selecciona tu área</option>
                            <option value="GRP">GRP</option>
                            <option value="TH">TH</option>
                            <option value="MTTO">MTTO</option>
                            <option value="TI">TI</option>
                            <option value="CONTRALORIA">CONTRALORIA</option>
                            <option value="VENTAS">VENTAS</option>
                            <option value="RESERVAS">RESERVAS</option>
                            <option value="HK">HK</option>
                            <option value="COCINA">COCINA</option>
                            <option value="AYB">AYB</option>
                            <option value="STEWARD">STEWARD</option>
                            <option value="RECEPCION">RECEPCION</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="sugerencia">¿Cuál es tu propuesta?</label>
                        <textarea id="sugerencia" name="sugerencia" rows="6" required placeholder="Describe tu idea de forma clara y concisa..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <span>Enviar propuesta</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <a class="admin-link" id="go-to-login">Acceso administrativo</a>
            </div>
        </section>

        <!-- Wall Section -->
        <section id="wall-section" class="section">
            <div id="wall-grid" class="wall-grid">
                <!-- Cards will be injected here -->
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: #94a3b8;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top: 1rem;">Cargando historias de éxito...</p>
                </div>
            </div>
        </section>

        <!-- Login Section -->
        <section id="login-section" class="section">
            <div class="card" style="max-width: 450px; margin: 0 auto;">
                <h2 style="margin-bottom: 1.5rem; text-align: center;">Administración</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                    <a class="admin-link" id="back-to-form">Volver al inicio</a>
                </form>
            </div>
        </section>

        <!-- Admin Dashboard -->
        <section id="admin-dashboard" class="section">
            <div class="admin-stats">
                <div class="stat-item">
                    <div class="stat-label">Total Sugerencias</div>
                    <div class="stat-value" id="total-count">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Pendientes</div>
                    <div class="stat-value" id="pending-count" style="color: var(--warning);">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Aprobadas</div>
                    <div class="stat-value" id="approved-count" style="color: var(--success);">0</div>
                </div>
            </div>

            <div class="card" style="padding: 2rem; margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1.5rem;">Distribución por Áreas</h3>
                <div style="height: 300px;">
                    <canvas id="areaChart"></canvas>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Colaborador</th>
                            <th>Área</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="suggestions-body">
                        <!-- Admin rows injected here -->
                    </tbody>
                </table>
            </div>
            
            <div style="text-align: right; margin-top: 2rem;">
                <button class="btn btn-primary" id="logout-btn" style="width: auto; background: #64748b;">Cerrar Sesión</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
